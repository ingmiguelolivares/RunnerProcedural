<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Runner Procedural Music</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #111827;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #unity-container, #unity-canvas {
        width: 100%;
        height: 100%;
      }

      #unity-canvas {
        display: block;
        background: #111827;
      }

      #unity-loading-bar {
        position: absolute;
        left: 50%;
        top: 50%;
        width: min(70vw, 320px);
        transform: translate(-50%, -50%);
        z-index: 5;
        color: white;
        text-align: center;
      }

      #unity-progress-track {
        width: 100%;
        height: 10px;
        margin-top: 12px;
        border-radius: 999px;
        background: rgba(255,255,255,0.18);
        overflow: hidden;
      }

      #unity-progress-bar {
        width: 0%;
        height: 100%;
        background: #60a5fa;
      }

      #ios-start-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(17, 24, 39, 0.96);
        z-index: 20;
        color: white;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
      }

      #ios-start-card {
        width: min(92vw, 420px);
      }

      #ios-start-card h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      #ios-start-card p {
        margin: 0 0 18px;
        line-height: 1.45;
        color: rgba(255,255,255,0.88);
      }

      #ios-start-button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 14px 28px;
        font-size: 18px;
        font-weight: 700;
        color: white;
        background: #2563eb;
      }

      #ios-start-status {
        min-height: 20px;
        margin-top: 12px;
        font-size: 14px;
        color: rgba(255,255,255,0.72);
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div>Loading...</div>
        <div id="unity-progress-track">
          <div id="unity-progress-bar"></div>
        </div>
      </div>
      <div id="ios-start-overlay">
        <div id="ios-start-card">
          <h1>Tap to start</h1>
          <p>On iPhone and iPad, the first tap unlocks Web Audio and then starts the experience.</p>
          <button id="ios-start-button" type="button">Tap to start</button>
          <div id="ios-start-status"></div>
        </div>
      </div>
    </div>

    <script>
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBar = document.querySelector("#unity-progress-bar");
      var iosStartOverlay = document.querySelector("#ios-start-overlay");
      var iosStartButton = document.querySelector("#ios-start-button");
      var iosStartStatus = document.querySelector("#ios-start-status");
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/RunnerProcedural.loader.js";
      var unityInstance = null;
      var unityBootStarted = false;

      var config = {
        dataUrl: buildUrl + "/RunnerProcedural.data.unityweb",
        frameworkUrl: buildUrl + "/RunnerProcedural.framework.js.unityweb",
        codeUrl: buildUrl + "/RunnerProcedural.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "MOlivares",
        productName: "Runner Procedural Music",
        productVersion: "0.1"
      };

      function isAppleMobileWeb() {
        var ua = navigator.userAgent || "";
        var iOSDevice = /iPad|iPhone|iPod/.test(ua);
        var iPadDesktopUA = navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1;
        return iOSDevice || iPadDesktopUA;
      }

      function warmupIosOutput(ctx) {
        if (!ctx) return;
        try {
          var buffer = ctx.createBuffer(1, 1, Math.max(22050, ctx.sampleRate || 44100));
          var source = ctx.createBufferSource();
          var gain = ctx.createGain();
          gain.gain.value = 0.00001;
          source.buffer = buffer;
          source.connect(gain);
          gain.connect(ctx.destination);
          source.start(0);
          if (source.stop) source.stop(0.001);
        } catch (e) {
        }
      }

      function primeProceduralAudioFromGesture() {
        var AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;

        if (!window.ProceduralSynthState) {
          window.ProceduralSynthState = {
            ctx: null,
            node: null,
            master: null,
            driver: null,
            unlockListenersInstalled: false
          };
        }

        window.ProceduralSynthWarmupIosOutput = window.ProceduralSynthWarmupIosOutput || warmupIosOutput;

        window.ProceduralSynthEnsureAudioUnlocked = window.ProceduralSynthEnsureAudioUnlocked || function() {
          var state = window.ProceduralSynthState;
          if (!state.ctx) {
            state.ctx = new AudioCtx();
          }

          if (!state.node) {
            state.master = state.ctx.createGain();
            state.master.gain.value = 1.0;

            state.node = state.ctx.createScriptProcessor(1024, 1, 2);
            state.node.onaudioprocess = function(evt) {
              var left = evt.outputBuffer.getChannelData(0);
              var right = evt.outputBuffer.numberOfChannels > 1 ? evt.outputBuffer.getChannelData(1) : left;
              left.fill(0);
              if (right !== left) right.fill(0);
            };

            if (state.ctx.createConstantSource) {
              state.driver = state.ctx.createConstantSource();
              state.driver.offset.value = 0.000001;
              state.driver.connect(state.node);
              state.driver.start();
            } else if (state.ctx.createOscillator) {
              state.driver = state.ctx.createOscillator();
              var driverGain = state.ctx.createGain();
              driverGain.gain.value = 0.000001;
              state.driver.frequency.value = 20;
              state.driver.connect(driverGain);
              driverGain.connect(state.node);
              state.driver.start();
            }

            state.node.connect(state.master);
            state.master.connect(state.ctx.destination);
          }

          warmupIosOutput(state.ctx);

          if (state.ctx.state === "suspended") {
            try {
              state.ctx.resume();
            } catch (e) {
            }
          }
        };

        window.ProceduralSynthEnsureAudioUnlocked();
      }

      function startUnityRuntime() {
        if (unityBootStarted) {
          return;
        }

        unityBootStarted = true;

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = function() {
          createUnityInstance(canvas, config, function(progress) {
            progressBar.style.width = (100 * progress) + "%";
          }).then(function(instance) {
            unityInstance = instance;
            loadingBar.style.display = "none";

          }).catch(function(message) {
            alert(message);
          });
        };
        document.body.appendChild(script);
      }

      if (isAppleMobileWeb()) {
        iosStartOverlay.style.display = "flex";
        iosStartButton.addEventListener("click", function() {
          if (unityBootStarted) {
            return;
          }

          iosStartButton.disabled = true;
          iosStartStatus.textContent = "Unlocking audio and loading scene...";
          primeProceduralAudioFromGesture();
          iosStartOverlay.style.display = "none";
          startUnityRuntime();
        }, { passive: true });
      } else {
        startUnityRuntime();
      }
    </script>
  </body>
</html>
