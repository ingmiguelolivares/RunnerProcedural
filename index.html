<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Runner Procedural Music</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-ios-start" style="display:none; position:absolute; inset:0; background:rgba(0,0,0,.82); color:#fff; align-items:center; justify-content:center; flex-direction:column; text-align:center; padding:24px; z-index:10;">
        <button id="unity-ios-start-button" style="font:inherit; padding:14px 22px; border:0; border-radius:10px; background:#fff; color:#000; cursor:pointer;">Tap to start</button>
        <p style="margin-top:14px;">En iPhone, Safari necesita una interacción del usuario para habilitar el audio.</p>
      </div>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Runner Procedural Music</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var unityContainer = document.querySelector("#unity-container");
      var iosStartOverlay = document.querySelector("#unity-ios-start");
      var iosStartButton = document.querySelector("#unity-ios-start-button");
      var unityLoadingBar = document.querySelector("#unity-loading-bar");
      var unityFullscreenButton = document.querySelector("#unity-fullscreen-button");
      var unityProgressBarFull = document.querySelector("#unity-progress-bar-full");
      var unityInstance = null;
      var unityHasStarted = false;
      var unityLoaderReady = false;
      var unityLoaderFailed = false;
      var pendingStartAfterLoader = false;
      var isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent) ||
        (navigator.userAgent.includes("Mac") && "ontouchend" in document);

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/ProceduralWeb.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/ProceduralWeb.data.unityweb",
        frameworkUrl: buildUrl + "/ProceduralWeb.framework.js.unityweb",
        codeUrl: buildUrl + "/ProceduralWeb.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "MOlivares",
        productName: "Runner Procedural Music",
        productVersion: "0.1",
        showBanner: unityShowBanner,
        // errorHandler: function(err, url, line) {
        //    alert("error " + err + " occurred at line " + line);
        //    // Return 'true' if you handled this error and don't want Unity
        //    // to process it further, 'false' otherwise.
        //    return true;
        // },
      };

      // By default, Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      // If you would like all file writes inside Unity Application.persistentDataPath
      // directory to automatically persist so that the contents are remembered when
      // the user revisits the site the next time, uncomment the following line:
      // config.autoSyncPersistentDataPath = true;
      // This autosyncing is currently not the default behavior to avoid regressing
      // existing user projects that might rely on the earlier manual
      // JS_FileSystem_Sync() behavior, but in future Unity version, this will be
      // expected to change.

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";

        // To lower canvas resolution on mobile devices to gain some
        // performance, uncomment the following line:
        // config.devicePixelRatio = 1;


      } else {
        // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:
        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }

      function unlockPageAudio() {
        var audioContextCtor = window.AudioContext || window.webkitAudioContext;
        if (audioContextCtor) {
          try {
            var context = new audioContextCtor();
            if (context.state === "suspended") {
              context.resume();
            }
            var buffer = context.createBuffer(1, 1, 22050);
            var source = context.createBufferSource();
            source.buffer = buffer;
            source.connect(context.destination);
            source.start(0);
          } catch (error) {
          }
        }

        document.querySelectorAll("audio, video").forEach((mediaElement) => {
          var playAttempt = mediaElement.play();
          if (playAttempt && typeof playAttempt.catch === "function") {
            playAttempt.catch(() => {});
          }
          mediaElement.pause();
        });
      }

      function actuallyStartUnity() {
        if (unityHasStarted) return;
        unityHasStarted = true;
        iosStartOverlay.style.display = "none";
        unityLoadingBar.style.display = "block";
        unlockPageAudio();
        createUnityInstance(canvas, config, (progress) => {
          unityProgressBarFull.style.width = 100 * progress + "%";
        }).then((createdUnityInstance) => {
          unityInstance = createdUnityInstance;
          unityLoadingBar.style.display = "none";
          unityFullscreenButton.onclick = () => {
            unityInstance.SetFullscreen(1);
          };
          unlockPageAudio();
        }).catch((message) => {
          alert(message);
        });
      }

      function startUnity() {
        if (unityHasStarted) return;
        if (unityLoaderFailed) {
          alert("No se pudo cargar el runtime de Unity.");
          return;
        }
        if (!unityLoaderReady) {
          pendingStartAfterLoader = true;
          iosStartButton.disabled = true;
          iosStartButton.textContent = "Loading...";
          return;
        }
        actuallyStartUnity();
      }

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        unityLoaderReady = true;
        if (pendingStartAfterLoader) {
          actuallyStartUnity();
        } else if (!isIOS) {
          startUnity();
        }
      };
      script.onerror = () => {
        unityLoaderFailed = true;
        iosStartButton.disabled = true;
        iosStartButton.textContent = "Load failed";
        alert("No se pudo cargar el archivo loader de Unity.");
      };
      document.body.appendChild(script);

      if (isIOS) {
        unityContainer.classList.add("unity-mobile");
        iosStartOverlay.style.display = "flex";
        iosStartButton.addEventListener("click", startUnity, { once: true });
        iosStartButton.addEventListener("touchend", startUnity, { once: true });
      } else {
        if (unityLoaderReady) {
          startUnity();
        }
      }

    </script>
  </body>
</html>
